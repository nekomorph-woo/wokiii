<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wok — {{FEATURE_NAME}}</title>
  <link rel="stylesheet" href="_style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>wok — {{FEATURE_NAME}}</h1>
      <span class="edition">Pipeline Dashboard</span>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="overview">概览</button>
      <button class="tab-btn" data-tab="requirements">需求</button>
      <button class="tab-btn" data-tab="design">设计</button>
      <button class="tab-btn" data-tab="check">校验</button>
      <button class="tab-btn" data-tab="execution">执行</button>
    </nav>

    <main>
      <div id="welcome" class="welcome">
        <h2>Pipeline Dashboard</h2>
        <p>打开 feature 目录以加载管道文档</p>
        <button class="btn-primary" id="open-dir-btn">打开目录</button>
        <input type="file" id="dir-input" webkitdirectory multiple>
      </div>

      <div id="tab-overview" class="tab-content"></div>
      <div id="tab-requirements" class="tab-content md-content"></div>
      <div id="tab-design" class="tab-content"></div>
      <div id="tab-check" class="tab-content md-content"></div>
      <div id="tab-execution" class="tab-content md-content"></div>
    </main>
  </div>

  <button class="notes-toggle" id="notes-toggle-btn" title="备注面板">&#x270D;</button>
  <div id="notes-panel">
    <div class="notes-header">
      <h3>备注</h3>
      <button class="btn-sm" id="copy-all-btn">复制全部</button>
    </div>
    <div class="notes-list" id="notes-list"></div>
    <div class="notes-input">
      <textarea id="note-textarea" placeholder="记录备注、决策或疑问..."></textarea>
      <div class="notes-actions">
        <select id="note-type" class="btn-sm">
          <option value="decision">决策</option>
          <option value="question">疑问</option>
          <option value="suggestion">建议</option>
        </select>
        <button class="btn-sm" id="add-note-btn">添加</button>
      </div>
    </div>
  </div>

  <div id="ref-popover">&#x1F4CC; 添加引用</div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script>window.markdownit || document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/14.1.0/markdown-it.min.js"><\/script>');</script>
  <script src="_render.js"></script>
</body>
</html>
